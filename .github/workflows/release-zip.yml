name: Build Release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate tag version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match manifest version $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build browser package directories
        shell: bash
        run: |
          node scripts/build-browser-packages.js

      - name: Build ZIP archives
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          (cd dist/chromium && zip -r "../HeHe-chromium-v${VERSION}.zip" .)
          (cd dist/firefox && zip -r "../HeHe-firefox-v${VERSION}.zip" .)

      - name: Upload Chromium workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeHe-chromium-v${{ steps.version.outputs.version }}
          path: dist/HeHe-chromium-v${{ steps.version.outputs.version }}.zip

      - name: Upload Firefox workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeHe-firefox-v${{ steps.version.outputs.version }}
          path: dist/HeHe-firefox-v${{ steps.version.outputs.version }}.zip

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "HeHe ${GITHUB_REF_NAME}" \
              --generate-notes || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi

      - name: Upload GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/HeHe-chromium-v${{ steps.version.outputs.version }}.zip" \
            "dist/HeHe-firefox-v${{ steps.version.outputs.version }}.zip" \
            --clobber